<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="container">
    <h1>Change Password</h1>

    <p id="message" class="message" hidden></p>
    <p id="error" class="error" hidden></p>

    <form id="changePasswordForm">
        <label for="currentPassword">Current Password <span class="required">*</span></label>
        <input type="password" id="currentPassword" name="currentPassword" placeholder="Current Password" required>

        <label for="newPassword">New Password <span class="required">*</span></label>
        <input type="password" id="newPassword" name="newPassword" placeholder="New Password" required>

        <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>

        <button type="submit">Update Password</button>
    </form>

    <a class="btn" id="homeLink" href="#">Home</a>
</div>

<script src="/js/api.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('id') || requireAuth();

    if (!userId) {
        throw new Error('Missing user id');
    }

    document.getElementById('homeLink').href = '/home.html';

    document.getElementById('changePasswordForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        showMessage('message', '');
        showMessage('error', '', true);

        const payload = {
            currentPassword: document.getElementById('currentPassword').value,
            newPassword: document.getElementById('newPassword').value,
            confirmPassword: document.getElementById('confirmPassword').value
        };

        try {
            await apiRequest(`/api/users/${userId}/password`, {
                method: 'PUT',
                body: JSON.stringify(payload)
            });

            showMessage('message', 'Password updated successfully.');
            document.getElementById('changePasswordForm').reset();

            setTimeout(() => {
                window.location.href = '/home.html';
            }, 800);
        } catch (error) {
            showMessage('error', formatError(error), true);
        }
    });
</script>

</body>
</html>
